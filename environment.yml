name: deeplsh
channels:
  - conda-forge
dependencies:
  - python=3.9
  - pip=23.3.1
  # pandas 1.2.4 on osx-arm64 is built against setuptools <60.
  - setuptools<60
  - numpy=1.19.5
  - pandas=1.2.4
  - scikit-learn=0.24.2
  - scipy=1.7.0
  - h5py=3.1.0
  - grpcio=1.34.1
  - requests
  - chardet
  - pip:
      # Apple Silicon native TensorFlow.
      # Note: Using upstream `tensorflow==2.5.0` on x86_64 requires AVX and will not run under Rosetta.
      - tensorflow-macos==2.5.0
      # Used by `deeplsh.core.*`
      - pylev==1.4.0
      - fnvhash==0.2.1
