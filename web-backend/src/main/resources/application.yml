spring:
  application:
    name: log-dedup-web-backend
  datasource:
    url: jdbc:h2:file:./data/logdedup;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  python:
    workdir: /Users/zhao/domo_codex/deep-locality-sensitive-hashing-main
    script: /Users/zhao/domo_codex/deep-locality-sensitive-hashing-main/code/run.py
    model-artifact: /Users/zhao/domo_codex/deep-locality-sensitive-hashing-main/code/Models/model-deep-lsh-cicids.model
    mlp-model-artifact: /Users/zhao/domo_codex/deep-locality-sensitive-hashing-main/code/Models/model-deep-lsh-cicids.model
    bigru-model-artifact: /Users/zhao/domo_codex/deep-locality-sensitive-hashing-main/code/Models/model-deep-lsh-cicids-bigru.model
    flows-csv: /Users/zhao/domo_codex/deep-locality-sensitive-hashing-main/code/Models/cicids_flows.csv
  experiments:
    results-dir: /Users/zhao/domo_codex/deep-locality-sensitive-hashing-main/results
